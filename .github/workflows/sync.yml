name: Sync to GitLab and Codeberg

on:
  schedule:
    # 每周二北京时间凌晨 4 点运行 (对应 UTC 周一 20:00)
    - cron: '0 20 * * 1'
  workflow_dispatch: # 允许手动点击按钮触发

permissions:
  contents: write

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install requests

    - name: Run Sync Script
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
        GL_TOKEN: ${{ secrets.GL_TOKEN }}
        GL_URL: ${{ secrets.GL_URL }}
        CB_TOKEN: ${{ secrets.CB_TOKEN }}
        CB_URL: ${{ secrets.CB_URL }}
        CB_USERNAME: ${{ secrets.CB_USERNAME }}
      run: python sync_tool.py

    - name: Keepalive
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git commit --allow-empty -m "Chore: Keepalive for scheduled workflow"
        git push origin master
